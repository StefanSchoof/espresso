stages:
- stage: Build
  jobs:
  - job: node
    pool: Hosted Ubuntu 1604
    steps:
    - task: Docker@1
      displayName: 'docker login'
      inputs:
        containerregistrytype: 'Container Registry'
        dockerRegistryEndpoint: 'docker hub sschoof'
        command: login

- stage: test
  jobs:
  - deployment: deploy
    environment: test
    pool: Hosted Ubuntu 1604
    strategy:
      runOnce:
        deploy:
          steps:
          - bash: echo "##vso[task.setvariable variable=NodeInstrumentationKey;issecret=true;isOutput=true]this is the value"
            name: iac
  - deployment: container
    environment: test
    dependsOn: deploy
    pool: Hosted Ubuntu 1604
    variables:
      NodeInstrumentationKey: $[ dependencies.deploy.outputs['iac.NodeInstrumentationKey'] ]
    strategy:
      runOnce:
        deploy:
          steps:
          - bash: printenv | sort
